<!DOCTYPE html>
<html lang="ptt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>esstudos de iframe</title>
    <style>
        iframe {
            width: 400px;
            height: 400px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h1>Testando o uso de um iframe</h1>
    <p>acessando o site do <a href="https://www.cursoemvideo.com" target="_blank">CursoemVideo</a> para aprender  aa programar</p>
      <!--tamanho padrão 300x150px-->
    <p>acessando o site do 
        <iframe src="https://www.cursoemvideo.com" frameborder="0" height="500" scolling="no">
                 <a href="https://www.cursoemvideo.com" target="_blank">CursoemVideo</a>
        </iframe>
    <p>o repositorio do guanabara
    
        <iframe src="https://gustavoguanabara.github.io" frameborder="0" height="500" width="500">
            <a href="https://gustavoguanabara.github.io"></a>
        </iframe>
        
            tambem e muito legal</p>
</body>
</html>
